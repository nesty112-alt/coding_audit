name: Build EXE Application

# main 브랜치에 코드가 푸시될 때마다 자동으로 실행됩니다.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # <-- 이 줄을 추가하면 수동 실행 버튼이 활성화됩니다.

jobs:
  build:
    # exe 파일을 만들어야 하므로 Windows 환경에서 실행합니다.
    runs-on: windows-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 호환성이 가장 안정적인 3.11 버전 사용

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: PyInstaller로 EXE 빌드
      # --onefile: 단일 실행 파일로 생성
      # --windowed: 프로그램 실행 시 검은색 콘솔 창(CMD) 숨김
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "DataValidator" main.py

    - name: 빌드된 EXE 파일 업로드 (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: DataValidator-Executable
        path: dist/DataValidator.exe
